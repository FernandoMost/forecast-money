# ─────────────────────────────────────────────────────────────────────────────
# category_rules.yaml — User-configurable transaction categorization rules
#
# Format:
#   - category: <string>      # top-level category
#     subcategory: <string>   # subcategory (snake_case)
#     patterns:               # list of regex strings (case-insensitive, first match wins)
#       - "REGEX_1"
#       - "REGEX_2"
#
# Rules are evaluated in order — the FIRST match wins.
# Edit freely: add, remove, or reorder rules.
# Run POST /api/v1/recategorize after changes to update existing transactions.
# ─────────────────────────────────────────────────────────────────────────────

# ── Income ───────────────────────────────────────────────────────────────────
- category: income
  subcategory: payroll
  patterns:
    - "NOMINA|SALARIO|SUELDO|CONCEPTO\\s+Nomina"

- category: income
  subcategory: transfer_in
  patterns:
    - "^TRANSFERENCIA DE "
    - "^TRANSFERENCIA INMEDIATA DE"

- category: income
  subcategory: bizum_in
  patterns:
    - "^BIZUM DE "

- category: income
  subcategory: refund
  patterns:
    - "^ANULACION"
    - "DEVOLUCION|REEMBOLSO|REFUND"

- category: income
  subcategory: paypal_in
  patterns:
    - "PAYPAL.*CONCEPTO YYW"

# ── Housing ──────────────────────────────────────────────────────────────────
- category: housing
  subcategory: rent
  patterns:
    - "ALQUILER|ARRENDAMIENTO|CONCEPTO.*[Aa]lquiler"

- category: housing
  subcategory: utilities_electricity
  patterns:
    - "ENDESA|IBERDROLA|NATURGY|REPSOL.*LUZ|ELECTRICIDAD|WASABI ENERGIA"

- category: housing
  subcategory: utilities_water
  patterns:
    - "VIAQUA|AGUAS|AGUA\\b"

- category: housing
  subcategory: utilities_heating
  patterns:
    - "AGENCIA VILLAR|CALEFAC"

- category: housing
  subcategory: internet_phone
  patterns:
    - "PEPEPHONE|MOVISTAR|VODAFONE|ORANGE|YOIGO|DIGI\\b|MASMOVIL"

# ── Subscriptions ─────────────────────────────────────────────────────────────
- category: subscriptions
  subcategory: streaming
  patterns:
    - "NETFLIX|SPOTIFY|HBO|DISNEY|PRIME VIDEO|APPLE.*TV|TWITCH"

- category: subscriptions
  subcategory: gym
  patterns:
    - "DREAMFIT|GIMNASIO|GYM\\b|MCFIT|FITNESS"

- category: subscriptions
  subcategory: sports_club
  patterns:
    - "XESTION DE ACTIVIDADES DEPORTIVAS|DEPORTIV"

- category: subscriptions
  subcategory: paypal_sub
  patterns:
    - "^RECIBO PayPal"

- category: subscriptions
  subcategory: pagatelia
  patterns:
    - "PAGATELIA"

- category: subscriptions
  subcategory: other_sub
  patterns:
    - "^RECIBO "

# ── Groceries ─────────────────────────────────────────────────────────────────
- category: groceries
  subcategory: supermarket
  patterns:
    - "LIDL|MERCADONA|CARREFOUR|ALCAMPO|ALDI|DIA\\b|AHORRO|MERCAMAS|MERKASIA|MARKET SANTIAGO"

- category: groceries
  subcategory: other_food_shop
  patterns:
    - "AUTOSERVICIO|FRUTERIA|VERDULERIA|GRAN BAZAR"

# ── Restaurants & Leisure ─────────────────────────────────────────────────────
- category: restaurants
  subcategory: fast_food
  patterns:
    - "MC DONALDS|MCDONALDS|BURGER KING|BK\\d|FIVE GUYS|KFC|POPEYES|KEBAB|GYROS|ROYAL DONNER"

- category: restaurants
  subcategory: restaurant
  patterns:
    - "RESTAURANTE|COMPOSTELA H\\.|WOK TOWN|SUPERTROPICAL|VIPS|A FUEGO LENTO|SABORES|CAFE BAR|CAFE DALIA|ADELIA|MAMBARA|GINOS|LA MARIPEPA|LOS SECRETOS|LA NEGRA|VERMUTERIA|BAR AQUEVINO|PIK POLLO|COSTA VELLA|GALIA|SOU SHUSHI|SUSHI|PLAZA LENCE|ROYAL KEBAB|ASIAN POCKET|CAFE LA MORENA"

- category: restaurants
