# ─────────────────────────────────────────────────────────────────────────────
# clean_description_rules.yaml — User-configurable friendly label rules
#
# Format:
#   - label: <string>         # short human-friendly label (shown in UI)
#     patterns:               # list of regex strings (case-insensitive, first match wins)
#       - "REGEX_1"
#       - "REGEX_2"
#
# Rules are evaluated in order — the FIRST match wins.
# If no rule matches, clean_description will be null (AI can fill it if enabled).
# Edit freely: add, remove, or reorder rules.
# Run POST /api/v1/recategorize after changes to update existing transactions.
# ─────────────────────────────────────────────────────────────────────────────

# ── Income ───────────────────────────────────────────────────────────────────
- label: "Nómina"
  patterns:
    - "NOMINA|SALARIO|SUELDO"

- label: "Devolución"
  patterns:
    - "^ANULACION|DEVOLUCION|REEMBOLSO|REFUND"

- label: "Bizum recibido"
  patterns:
    - "^BIZUM DE "

- label: "Transferencia recibida"
  patterns:
    - "^TRANSFERENCIA (INMEDIATA )?DE "

- label: "Ingreso PayPal"
  patterns:
    - "PAYPAL.*CONCEPTO YYW"

