steps:
  # ─── Build backend ─────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-backend
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/finance-analyzer-backend:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/finance-analyzer-backend:latest"
      - -f
      - docker/Dockerfile.backend
      - .

  # ─── Push backend ──────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push-backend
    args:
      - push
      - "gcr.io/$PROJECT_ID/finance-analyzer-backend:$COMMIT_SHA"
    waitFor: [build-backend]

  # ─── Build frontend ────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-frontend
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/finance-analyzer-frontend:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/finance-analyzer-frontend:latest"
      - -f
      - docker/Dockerfile.frontend
      - --build-arg
      - NEXT_PUBLIC_API_URL=https://finance-backend-$_CLOUD_RUN_REGION-run.app/api/v1
      - .

  # ─── Push frontend ─────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push-frontend
    args:
      - push
      - "gcr.io/$PROJECT_ID/finance-analyzer-frontend:$COMMIT_SHA"
    waitFor: [build-frontend]

  # ─── Deploy backend to Cloud Run ───────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-backend
    args:
      - run
      - deploy
      - finance-analyzer-backend
      - --image=gcr.io/$PROJECT_ID/finance-analyzer-backend:$COMMIT_SHA
      - --region=$_CLOUD_RUN_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --set-env-vars=MONGO_URI=$$MONGO_URI
      - --set-secrets=MONGO_URI=mongo-uri:latest
    waitFor: [push-backend]

  # ─── Deploy frontend to Cloud Run ──────────────────────────────────────
  - name: "gcr.io/cloud-builders/gcloud"
    id: deploy-frontend
    args:
      - run
      - deploy
      - finance-analyzer-frontend
      - --image=gcr.io/$PROJECT_ID/finance-analyzer-frontend:$COMMIT_SHA
      - --region=$_CLOUD_RUN_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=256Mi
      - --cpu=1
    waitFor: [push-frontend, deploy-backend]

substitutions:
  _CLOUD_RUN_REGION: europe-west1

images:
  - "gcr.io/$PROJECT_ID/finance-analyzer-backend:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/finance-analyzer-frontend:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
